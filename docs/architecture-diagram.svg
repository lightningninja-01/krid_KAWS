<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6558"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="#FAF9F5"/>

  <text x="40" y="45" font-size="24" font-weight="700" fill="#1B1A17">Multi-Tenant WhatsApp AI SaaS — Architecture</text>

  <!-- Meta -->
  <rect x="40" y="90" width="200" height="70" rx="10" fill="#25D366" opacity="0.15" stroke="#25D366" stroke-width="1.5"/>
  <text x="140" y="120" font-size="14" font-weight="600" text-anchor="middle" fill="#1B1A17">Meta WhatsApp</text>
  <text x="140" y="140" font-size="12" text-anchor="middle" fill="#6B6558">Cloud API</text>

  <!-- Webhook -->
  <rect x="320" y="90" width="220" height="70" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="430" y="118" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">POST /api/webhooks/whatsapp</text>
  <text x="430" y="136" font-size="11" text-anchor="middle" fill="#6B6558">verify signature -&gt; HTTP 200 &lt;3s</text>
  <text x="430" y="151" font-size="11" text-anchor="middle" fill="#DC2626">never waits for LLM</text>

  <line x1="240" y1="125" x2="320" y2="125" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="115" font-size="10" text-anchor="middle" fill="#6B6558">payload</text>

  <!-- asyncio task -->
  <rect x="600" y="90" width="220" height="70" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="710" y="118" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">asyncio.create_task()</text>
  <text x="710" y="136" font-size="11" text-anchor="middle" fill="#6B6558">background execution</text>
  <text x="710" y="151" font-size="11" text-anchor="middle" fill="#6B6558">tracked by TaskRegistry</text>

  <line x1="540" y1="125" x2="600" y2="125" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LangGraph title -->
  <text x="40" y="215" font-size="18" font-weight="700" fill="#1B1A17">LangGraph — Conversation Pipeline</text>

  <!-- Graph nodes -->
  <g font-size="12">
    <rect x="40" y="240" width="180" height="60" rx="8" fill="#2563EB" opacity="0.12" stroke="#2563EB"/>
    <text x="130" y="265" text-anchor="middle" font-weight="600" fill="#1B1A17">Acknowledge</text>
    <text x="130" y="282" text-anchor="middle" fill="#6B6558" font-size="10">read receipt + typing ON</text>

    <rect x="260" y="240" width="180" height="60" rx="8" fill="#2563EB" opacity="0.12" stroke="#2563EB"/>
    <text x="350" y="265" text-anchor="middle" font-weight="600" fill="#1B1A17">Context Retriever</text>
    <text x="350" y="282" text-anchor="middle" fill="#6B6558" font-size="10">tenant + media + last 5 msgs</text>

    <rect x="480" y="240" width="180" height="60" rx="8" fill="#B5651D" opacity="0.12" stroke="#B5651D" stroke-dasharray="4 3"/>
    <text x="570" y="260" text-anchor="middle" font-weight="600" fill="#1B1A17">Media Interpreter</text>
    <text x="570" y="276" text-anchor="middle" fill="#6B6558" font-size="10">conditional: inbound image</text>
    <text x="570" y="290" text-anchor="middle" fill="#6B6558" font-size="10">GPT-4o vision</text>

    <rect x="700" y="240" width="180" height="60" rx="8" fill="#2563EB" opacity="0.12" stroke="#2563EB"/>
    <text x="790" y="265" text-anchor="middle" font-weight="600" fill="#1B1A17">LLM Reasoning</text>
    <text x="790" y="282" text-anchor="middle" fill="#6B6558" font-size="10">structured decision + sentiment</text>

    <rect x="700" y="360" width="180" height="60" rx="8" fill="#DC2626" opacity="0.12" stroke="#DC2626"/>
    <text x="790" y="385" text-anchor="middle" font-weight="600" fill="#1B1A17">Handover</text>
    <text x="790" y="402" text-anchor="middle" fill="#6B6558" font-size="10">sentiment &gt;= threshold</text>

    <rect x="480" y="360" width="180" height="60" rx="8" fill="#2563EB" opacity="0.12" stroke="#2563EB"/>
    <text x="570" y="385" text-anchor="middle" font-weight="600" fill="#1B1A17">Dispatcher</text>
    <text x="570" y="402" text-anchor="middle" fill="#6B6558" font-size="10">send reply, typing OFF</text>
  </g>

  <!-- edges -->
  <line x1="220" y1="270" x2="260" y2="270" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="270" x2="480" y2="270" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <text x="460" y="230" font-size="9" text-anchor="middle" fill="#6B6558">has image?</text>
  <line x1="660" y1="270" x2="700" y2="270" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="300" x2="350" y2="330" stroke="#6B6558" stroke-width="1.5"/>
  <line x1="350" y1="330" x2="790" y2="330" stroke="#6B6558" stroke-width="1.5"/>
  <line x1="790" y1="330" x2="790" y2="240" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="325" font-size="9" text-anchor="middle" fill="#6B6558">no image: skip straight to reasoning</text>

  <line x1="790" y1="300" x2="790" y2="360" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <text x="850" y="335" font-size="9" text-anchor="middle" fill="#DC2626">needs_human</text>
  <line x1="700" y1="390" x2="660" y2="390" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
  <text x="680" y="415" font-size="9" text-anchor="middle" fill="#6B6558">else</text>

  <!-- Dispatch back to Meta -->
  <line x1="570" y1="420" x2="570" y2="460" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="790" y1="420" x2="790" y2="460" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data layer -->
  <text x="40" y="500" font-size="18" font-weight="700" fill="#1B1A17">Data &amp; Delivery</text>

  <rect x="40" y="520" width="220" height="70" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="150" y="550" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">MongoDB Atlas</text>
  <text x="150" y="568" font-size="11" text-anchor="middle" fill="#6B6558">tenants · sessions · messages · customers</text>

  <rect x="480" y="460" width="290" height="70" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="625" y="490" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">Meta Graph API</text>
  <text x="625" y="508" font-size="11" text-anchor="middle" fill="#6B6558">text · image · document · typing indicator</text>

  <line x1="150" y1="420" x2="150" y2="520" stroke="#6B6558" stroke-width="1.5" opacity="0.5"/>
  <text x="160" y="470" font-size="9" fill="#6B6558">every node reads/writes</text>

  <!-- Frontend -->
  <text x="40" y="660" font-size="18" font-weight="700" fill="#1B1A17">Dashboard (React + Tailwind)</text>
  <rect x="40" y="680" width="240" height="80" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="160" y="708" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">Live Chat Monitor</text>
  <text x="160" y="726" font-size="11" text-anchor="middle" fill="#6B6558">polls /api/sessions, /api/messages</text>
  <text x="160" y="742" font-size="11" text-anchor="middle" fill="#6B6558">every 2s · tenant-branded UI</text>

  <rect x="320" y="680" width="240" height="80" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="440" y="708" font-size="13" font-weight="600" text-anchor="middle" fill="#1B1A17">Broadcast Drawer</text>
  <text x="440" y="726" font-size="11" text-anchor="middle" fill="#6B6558">POST /api/broadcast</text>
  <text x="440" y="742" font-size="11" text-anchor="middle" fill="#6B6558">cohort by tag + template</text>

  <line x1="150" y1="590" x2="150" y2="680" stroke="#6B6558" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- Deployment note -->
  <rect x="600" y="680" width="560" height="140" rx="10" fill="#FFFFFF" stroke="#E7E3D8" stroke-width="1.5"/>
  <text x="620" y="708" font-size="13" font-weight="700" fill="#1B1A17">Deployment — Render (two services)</text>
  <text x="620" y="730" font-size="11" fill="#6B6558">1. Web Service — backend/Dockerfile, FastAPI + LangGraph runtime</text>
  <text x="620" y="748" font-size="11" fill="#6B6558">2. Static Site — frontend/, Vite build output</text>
  <text x="620" y="766" font-size="11" fill="#6B6558">Dockerfile respects $PORT — portable to GCP Cloud Run without changes</text>
  <text x="620" y="784" font-size="11" fill="#6B6558">Secrets via Render environment variables (never committed)</text>
  <text x="620" y="802" font-size="11" fill="#6B6558">MongoDB Atlas M0 — managed, no self-hosted DB to operate</text>
</svg>
